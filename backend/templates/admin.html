<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&N LOYA - Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 2rem; text-align: center; }
        .header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .header p { opacity: 0.8; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .stat-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .stat-card .value { font-size: 2.5rem; font-weight: bold; color: #1a1a2e; }
        .stat-card .label { color: #666; margin-top: 0.5rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .footer { text-align: center; padding: 2rem; color: #666; }
        .footer a { color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="header">
        <h1>J&N LOYA Admin Dashboard</h1>
        <p>Coupon Card Winning System</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="value">{{ totalCards }}</div>
            <div class="label">Total Cards</div>
        </div>
        <div class="stat-card">
            <div class="value">{{ totalWinners }}</div>
            <div class="label">Total Winners</div>
        </div>
        <div class="stat-card">
            <div class="value">{{ totalLosers }}</div>
            <div class="label">Total Losers</div>
        </div>
        <div class="stat-card">
            <div class="value">{{ redeemedPrizes }}</div>
            <div class="label">Redeemed Prizes</div>
        </div>
        <div class="stat-card">
            <div class="value">{{ pendingRedemptions }}</div>
            <div class="label">Pending Redemptions</div>
        </div>
    </div>

    <div class="footer">
        <p>API available at <a href="/api/admin/stats">/api/admin/stats</a></p>
    </div>
</body>
</html>
